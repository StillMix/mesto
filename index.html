<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pages/index.css">
    <title>Место</title>
</head>

<body class="body">
    <div class="page">
        <header class="header">
            <img src="images/header-logo.svg" alt="Логотип сайта" class="header__logo">
        </header>
        <main class="content">
            <section class="profile">
                <img src="images/profile-avatar.png" alt="Аватарка профиля" class="profile__avatar">
                <div class="profile__info">
                    <div class="profile__container">
                        <h1 class="profile__name">Жак-Ив Кусто</h1>
                        <button aria-label="Close" type="button" class="profile__change"></button>
                    </div>
                    <p class="profile__status">Исследователь океана</p>
                </div>
                <button class="profile__btn-add" type="button">
                    <img src="images/add-plus.svg" class="profile__btn-plus" alt="Добавление записей"></button>
            </section>
            <section class="cards">
                <ul class="elements">

                </ul>
            </section>
        </main>
        <footer class="footer">
            <p class="footer__copyright">© 2020 Mesto Russia</p>
        </footer>
        <template class="element-template">
            <li class="element">
                <button type="button" class="elemnt__btnopen"><img class="element__image"></button>
                <button class="element__backet" type="button"></button>
                <div class="element__container">
                    <h3 class="element__name"></h3>
                    <button class="element__heart"></button>
                </div>
            </li>
        </template>
        <div class="popup">
            <div class="popup__overlay">
                <button aria-label="Close" class="popup__back" type="button"><img src="images/back-button.svg" class="popup__back-image" alt="Кнопка назад"></button>
                <h2 class="popup__title">Редактировать профиль</h2>
                <form name="form" class="popup__form">
                    <input type="text" placeholder="Имя" class="input input_type_name" name="NameInput">
                    <input type="text" placeholder="О себе" class="input input_type_status" name="JobInput">
                    <button class="popup__btn" type="submit">Сохранить</button>
                </form>
            </div>
        </div>
        <div class="popupIMG">
            <div class="popup__overlay">
                <button aria-label="Close" class="popupIMG__back" type="button"><img src="images/back-button.svg" class="popup__back-image" alt="Кнопка назад"></button>
                <h2 class="popup__title">Новое место</h2>
                <form name="form" class="popupIMG__form">
                    <input type="text" placeholder="Название" class="input input_type_nameIMG" name="NameIMGInput">
                    <input type="text" placeholder="Ссылка на картинку" class="input input_type_src" name="SrcInput">
                    <button class="popupIMG__btn" type="submit">Создать</button>
                </form>
            </div>
        </div>
    </div>

    <div class="popupopen__container">
        <div class="popupopen__overlay">
            <button aria-label="Close" class="popupopen__back" type="button"><img src="images/back-button.svg" class="popupopen__back-image" alt="Кнопка назад"></button>
            <img class="popupopen__img">
            <p class="popupopen__title"></p>
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>

</html>
